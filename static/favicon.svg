<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="基金监控">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="cubeFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#243b78" />
      <stop offset="100%" stop-color="#182955" />
    </linearGradient>
    <linearGradient id="cubeSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d458a" />
      <stop offset="100%" stop-color="#1f3164" />
    </linearGradient>
    <linearGradient id="cubeTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#314a92" />
      <stop offset="100%" stop-color="#22366d" />
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#35c2ff" />
      <stop offset="100%" stop-color="#19f0df" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#bg)" />

  <path d="M17 48 L32 56 L48 48 L32 41 Z" fill="#ffffff" fill-opacity="0.4" />

  <path d="M20 21 L32 14 L45 21 L32 28 Z" fill="url(#cubeTop)" />
