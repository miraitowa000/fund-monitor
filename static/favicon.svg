  <path d="M45 21 L45 44 L32 51 L32 28 Z" fill="url(#cubeSide)" />

  <path d="M23 19 L31 14.5 L39 19" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.9" />
  <path d="M25 23 L29 23" fill="none" stroke="url(#neon)" stroke-width="1.8" stroke-linecap="round" />
  <path d="M31 21.5 L39 21.5" fill="none" stroke="url(#neon)" stroke-width="1.8" stroke-linecap="round" />

  <path d="M12 40 L22 34 L30 43 L40 28 L52 18" fill="none" stroke="url(#neon)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <path d="M47.5 18.5 L52 18 L51.5 22.5" fill="none" stroke="url(#neon)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <path d="M17 24 L17 33" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity="0.92" />
  <path d="M46 35 L46 42" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity="0.92" />
