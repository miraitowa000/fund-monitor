services:
  fund-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fund-monitor
    restart: always
    ports:
      - "8065:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
